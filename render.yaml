services:
  - type: worker
    name: telegram-letta-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_letta_bridge.py
    envVars:
      - key: TELEGRAM_TOKEN
        scope: all
      - key: LETTA_API_KEY
        scope: all
      - key: AGENT_ID
        scope: all
      - key: LETTA_API_BASE_URL
        value: https://api.letta.com
